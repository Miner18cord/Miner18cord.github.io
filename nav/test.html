<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航页</title>
  <style>
    /*这里写css*/
    body{
        margin:0%;
        padding: 0%;
    }

    #dash-board {
        display:grid;
        height: 100vh;  /*100vh代表容器充满整个视口*/
        /* gap:30px; */
        grid-template-columns: minmax(300px,1fr) minmax(450px,1.5fr) 
        minmax(300px,1fr);
        justify-content: center;
        background: rgba(139, 200, 211, 0.452);
    }

    .container{     /*容器统一属性*/
        display: flex;
        border:5px solid red;
        width:100%;
        height: 100%;
        align-items: center;
        justify-content: center;
    }

    #search-box{
        position: relative;
        display: flex;
        flex-direction: column;
        aspect-ratio: 1/1.85;
        width:80%;
        min-width: 300px;
        height:auto;
        z-index:1;
        align-items: center;
        padding: 20px 15px 20px 15px;
        
    }
    
    #search-box::before{
        content: "";
        position: absolute;
        background: rgba(159, 187, 228, 0.63);
        background: linear-gradient(rgba(159, 187, 228, 0.63),rgba(159, 187, 228, 0.075));
        border:2px solid rgba(255, 255, 255, 0.164);
        box-shadow: 0 25px 25px rgba(0, 0, 0, 0.349);
        border-radius: 15px;
        backdrop-filter: blur(5px);
        width: 100%;
        top:50%;
        left:50%;
        translate: -50% -50%;
        height: 100%;
        z-index: 0;
    }

    .search-text{
        color:rgb(255, 255, 255);
        font-size: 1.5rem;
        font-weight: bold;
        position: relative;
        z-index:2;
        text-align: center;
        letter-spacing: 2px;
        line-height: 40px;
    }

    #search-bar{
        height:30px;
        width: 90%;
        background-color: aliceblue;
        color:rgb(150, 150, 150);
        font-size: 1.5rem;
        font-style: italic;
        position: relative;
        z-index:2;
        text-align: start;
        letter-spacing: 2px;
        border-radius: 10px;
        text-overflow: ellipsis;
        overflow:hidden;
        white-space: nowrap;
        border-color: transparent;
    }



  </style>
</head>
<body>
    <!--这里是页面显示的元素-->
    <div id="dash-board">
        <div id="search-container" class="container">
            <div id="search-box">
                <div class="search-text">SEARCH</div>
                <input id="search-bar" type="text" placeholder="搜索...">
            </div>
        </div>
        <div id="model-container" class="container"></div>
        <div id="quick-access-container" class="container"></div>
    </div>
</body>
</html>
